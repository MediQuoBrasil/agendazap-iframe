<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teste de iFrame</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f7fb;
    }

    .page {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 16px 20px;
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
    }

    header h1 {
      margin: 0 0 6px;
      font-size: 18px;
      color: #111827;
    }

    header p {
      margin: 0;
      font-size: 14px;
      color: #4b5563;
      line-height: 1.4;
    }

    .frame-wrap {
      flex: 1;
      padding: 12px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>Teste de iFrame</h1>
      <p>
        URL em teste: <strong>https://agendazap.top/?mediquo&service=849</strong>
      </p>
    </header>

    <div class="frame-wrap">
      <iframe src="https://agendazap.top/?mediquo&service=849" title="Teste de iFrame"></iframe>
    </div>
  </div>
</body>
</html>
